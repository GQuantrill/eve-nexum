name: CI

# Lint + typecheck/build on every PR and on pushes to the integration branches.
# ESLint fails the job on errors only (warnings are allowed through), so the
# accumulated warnings don't block while they're being worked down.
on:
  pull_request:
  push:
    branches: [release, main]

permissions:
  contents: read

jobs:
  web:
    name: web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: web/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn build

  server:
    name: server (typecheck + test)
    runs-on: ubuntu-latest
    # Throwaway Postgres for the DB-integration suites (*.integration.test.ts).
    # The DB name ends in _test, which the test harness requires before it will
    # run (a guard against ever pointing TRUNCATE-heavy tests at a real DB).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nexum
          POSTGRES_PASSWORD: nexum
          POSTGRES_DB: eve_nexum_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexum -d eve_nexum_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: server
    env:
      PG_HOST: localhost
      PG_PORT: 5432
      PG_DB: eve_nexum_test
      PG_USER: nexum
      PG_PASSWORD: nexum
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: server/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: npx tsc --noEmit
      - run: yarn test
